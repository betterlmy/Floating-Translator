name: Desktop quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print tool versions
        shell: pwsh
        run: |
          go version
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Frontend tests
        run: npm run test --prefix frontend

      - name: Frontend build
        run: npm run build --prefix frontend

      - name: Go tests
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/bin | Out-Null
          $env:CGO_ENABLED = '0'
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o build/bin/floating-translator.exe .

      - name: Package Windows executable
        id: package
        shell: pwsh
        run: |
          $version = "build-${{ github.run_number }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          }
          $archive = "floating-translator-windows-amd64-$version.zip"
          Compress-Archive -Path build/bin/floating-translator.exe -DestinationPath "build/bin/$archive" -CompressionLevel Optimal
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: floating-translator-windows-amd64-${{ github.run_number }}
          path: |
            build/bin/floating-translator.exe
            build/bin/${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

      - name: Vulnerability scan
        shell: pwsh
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails v3 CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Print tool versions
        shell: bash
        run: |
          go version
          node --version
          npm --version
          wails3 version

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Frontend tests
        run: npm run test --prefix frontend

      - name: Frontend build
        run: npm run build --prefix frontend

      - name: Go tests
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Cross-compile Windows platform tests
        shell: bash
        run: |
          mkdir -p build/bin
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go test -c ./internal/platform -o build/bin/platform-windows.test.exe

      - name: Build macOS application
        shell: bash
        run: |
          version="0.1.0"
          if [[ "$GITHUB_REF_NAME" == [vV]* ]]; then
            version="$(echo "$GITHUB_REF_NAME" | sed 's/^[vV]//')"
          fi
          make package-macos WAILS=wails3 MACOS_VERSION="$version"

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: floating-translator-macos-arm64-${{ github.run_number }}
          path: |
            build/bin/floating-translator-macos-arm64.dmg
            build/bin/floating-translator-macos-arm64.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: Vulnerability scan
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          "$(go env GOPATH)/bin/govulncheck" ./...

  publish:
    name: Publish tagged desktop release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v4
        with:
          name: floating-translator-windows-amd64-${{ github.run_number }}
          path: release/windows

      - name: Download macOS packages
        uses: actions/download-artifact@v4
        with:
          name: floating-translator-macos-arm64-${{ github.run_number }}
          path: release/macos

      - name: Create or update GitHub desktop release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          archive="release/windows/floating-translator-windows-amd64-${TAG_NAME}.zip"
          executable="release/windows/floating-translator.exe"
          mac_dmg="release/macos/floating-translator-macos-arm64.dmg"
          mac_app_zip="release/macos/floating-translator-macos-arm64.app.zip"
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${executable}" "${archive}" \
              "${mac_dmg}" "${mac_app_zip}" --clobber
          else
            gh release create "${TAG_NAME}" "${executable}" "${archive}" \
              "${mac_dmg}" "${mac_app_zip}" \
              --title "Floating Translator ${TAG_NAME}" \
              --generate-notes
          fi
