name: Windows quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Print tool versions
        shell: pwsh
        run: |
          go version
          node --version
          npm --version

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Frontend tests
        run: npm run test --prefix frontend

      - name: Frontend build
        run: npm run build --prefix frontend

      - name: Go tests
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Build Windows executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/bin | Out-Null
          $env:CGO_ENABLED = '0'
          go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o build/bin/floating-translator.exe .

      - name: Package Windows executable
        id: package
        shell: pwsh
        run: |
          $version = "build-${{ github.run_number }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          }
          $archive = "floating-translator-windows-amd64-$version.zip"
          Compress-Archive -Path build/bin/floating-translator.exe -DestinationPath "build/bin/$archive" -CompressionLevel Optimal
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: floating-translator-windows-amd64-${{ github.run_number }}
          path: build/bin/${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 14

      - name: Vulnerability scan
        shell: pwsh
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
